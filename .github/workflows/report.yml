name: Reporte de Mermas

on:
  schedule:
    # 15:00 UTC = 11:00 AM Bolivia (UTC-4)
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  report:
    name: Generar y enviar reporte de mermas
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      HANA_HOST: ${{ secrets.HANA_HOST }}
      HANA_PORT: ${{ secrets.HANA_PORT }}
      HANA_USER: ${{ secrets.HANA_USER }}
      HANA_PASS: ${{ secrets.HANA_PASS }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
      REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Generar reporte de mermas
        run: npm run report-4

      - name: Enviar reporte por email
        run: npm run report-email
